services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Bishkek
      - SECRET_KEY=quran-tracker-docker-secret
      - DATABASE_URL=sqlite:///./data/quran.db
    volumes:
      - quran_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build: ./backend
    command: python bot/telegram_bot.py
    environment:
      - TZ=Asia/Bishkek
      - API_URL=http://backend:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - REMINDER_HOUR=20
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - bot

volumes:
  quran_data:
