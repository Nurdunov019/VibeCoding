# Render Blueprint — VibeCoding repo root
# Dashboard: New Blueprint → connect Nurdunov019/VibeCoding → Apply

services:
  - type: web
    name: proverkakg
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "112233"
      - key: ADMIN_EMAIL
        value: admin@proverkakg.kg
      - key: DATABASE_URL
        value: sqlite:///./proverkakg.db
