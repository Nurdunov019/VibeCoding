# Render Blueprint — Python (VibeCoding repo root)
services:
  - type: web
    name: proverkakg
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: ./build.sh
    startCommand: cd ProverkaKG/backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "112233"
      - key: ADMIN_EMAIL
        value: admin@proverkakg.kg
      - key: DATABASE_URL
        value: sqlite:///./proverkakg.db
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
