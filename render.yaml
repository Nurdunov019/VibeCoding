# ProverkaKG — Render Blueprint
# Deploy: Dashboard → Blueprints → New Blueprint Instance → select this repo

services:
  - type: web
    name: proverkakg
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "112233"
      - key: ADMIN_EMAIL
        value: admin@proverkakg.kg
      - key: DATABASE_URL
        value: sqlite:///./proverkakg.db
      - key: PYTHON_VERSION
        value: "3.11.0"
